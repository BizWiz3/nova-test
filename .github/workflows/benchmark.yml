name: Nova Performance Benchmark
on: [push, pull_request]

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Start Nova Server
        run: |
          docker build -t nova-app .
          docker run -d --network="host" --name nova-running-app nova-app
          
      - name: Wait for Server Ready
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8080/ > /dev/null; then
              echo "Nova is UP!"
              break
            fi
            echo "Waiting for Nova... ($i)"
            sleep 1
          done

      - name: Run k6 Benchmark
        run: |
          touch ${{ github.workspace }}/results.json
          touch ${{ github.workspace }}/summary.json
          chmod 666 ${{ github.workspace }}/results.json ${{ github.workspace }}/summary.json
          
          docker run --rm \
            --network="host" \
            -v ${{ github.workspace }}:/io \
            -i grafana/k6 run /io/scripts/bench.js \
            --out json=/io/results.json \
            --summary-export=/io/summary.json
        continue-on-error: true

      - name: Generate Action Summary
        if: always()
        run: |
          echo "## 🚀 Nova Performance Summary" >> $GITHUB_STEP_SUMMARY
          if [ -f "summary.json" ]; then
            # Extracting new, richer metrics
            RPS=$(jq -r '.metrics.http_reqs.values.rate' summary.json)
            TOTAL=$(jq -r '.metrics.http_reqs.values.count' summary.json)
            P95=$(jq -r '.metrics.http_req_duration.values["p(95)"]' summary.json)
            AVG=$(jq -r '.metrics.http_req_duration.values.avg' summary.json)
            SUCCESS=$(jq -r '.metrics.checks.values.passes' summary.json)
            TOTAL_CHKS=$(jq -r '.metrics.checks.values.passes + .metrics.checks.values.fails' summary.json)
            
            # Calculate Success Rate percentage
            SRATE=$(awk "BEGIN {printf \"%.2f\", ($SUCCESS/$TOTAL_CHKS)*100}")

            # Format and Export
            echo "RPS_VAL=$(printf "%.2f" $RPS)" >> $GITHUB_ENV
            echo "P95_VAL=$(printf "%.2f" $P95)" >> $GITHUB_ENV
            echo "TOTAL_VAL=$TOTAL" >> $GITHUB_ENV
            echo "SRATE_VAL=$SRATE" >> $GITHUB_ENV

            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total Requests** | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| **Requests/sec** | $(printf "%.2f" $RPS) req/s |" >> $GITHUB_STEP_SUMMARY
            echo "| **Success Rate** | $SRATE% |" >> $GITHUB_STEP_SUMMARY
            echo "| **Average Latency** | $(printf "%.4f" $AVG)ms |" >> $GITHUB_STEP_SUMMARY
            echo "| **p95 Latency** | $(printf "%.2f" $P95)ms |" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ summary.json not found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Update README with Stats
        if: github.ref == 'refs/heads/main' && env.RPS_VAL != '' && env.RPS_VAL != '0.00'
        run: |
          NEW_STATS="### ⚡ Latest Performance (Auto-updated)\n\n| Total Requests | Requests/sec | p95 Latency | Success Rate |\n| :--- | :--- | :--- | :--- |\n| **${{ env.TOTAL_VAL }}** | **${{ env.RPS_VAL }}** | **${{ env.P95_VAL }}ms** | **${{ env.SRATE_VAL }}%** |\n\n_Last Benchmarked: $(date)_"
          
          sed -i "//,//{ //b; //b; d }" README.md
          sed -i "//a $NEW_STATS" README.md
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update benchmark results [skip ci]" || echo "No changes to commit"
          git push

      - name: Show Nova Server Logs
        if: always()
        run: docker logs nova-running-app || echo "Logs unavailable."