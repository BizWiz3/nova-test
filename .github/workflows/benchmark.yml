name: Nova Performance Benchmark
on: [push, pull_request]

permissions: 
    contents: write
    
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Start Nova Server
        run: |
          docker build -t nova-app .
          docker run -d --network="host" --name nova-running-app nova-app
          
      - name: Wait for Server Ready
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8080/ > /dev/null; then
              echo "Nova is UP!"
              break
            fi
            echo "Waiting for Nova... ($i)"
            sleep 1
          done

      - name: Run k6 Benchmark
        run: |
          # Fix permissions for Docker write
          touch ${{ github.workspace }}/results.json
          chmod 666 ${{ github.workspace }}/results.json
          
          docker run --rm \
            --network="host" \
            -v ${{ github.workspace }}:/io \
            -i grafana/k6 run /io/scripts/bench.js \
            --out json=/io/results.json
        continue-on-error: true

      - name: Generate Action Summary
        if: always()
        run: |
          echo "## Nova Benchmark Results" >> $GITHUB_STEP_SUMMARY
          if [ -f "results.json" ]; then
            # k6 JSON stream contains many metrics; we want the final summary entries
            # We use 'select' to find the metric and ensure it's not a null value
            RPS=$(jq -r 'select(.metric=="http_reqs" and .values.rate != null) | .values.rate' results.json | tail -n 1)
            P95=$(jq -r 'select(.metric=="http_req_duration" and .values["p(95)"] != null) | .values["p(95)"]' results.json | tail -n 1)
            AVG=$(jq -r 'select(.metric=="http_req_duration" and .values.avg != null) | .values.avg' results.json | tail -n 1)
            
            # Default to 0 if variables are empty or null
            RPS=${RPS:-0}
            P95=${P95:-0}
            AVG=${AVG:-0}

            # Safely format numbers
            RPS_FIXED=$(printf "%.2f" "$RPS")
            P95_FIXED=$(printf "%.2f" "$P95")
            AVG_FIXED=$(printf "%.4f" "$AVG")

            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo "| **Requests/sec** | $RPS_FIXED req/s |" >> $GITHUB_STEP_SUMMARY
            echo "| **Average Latency** | ${AVG_FIXED}ms |" >> $GITHUB_STEP_SUMMARY
            echo "| **p95 Latency** | ${P95_FIXED}ms |" >> $GITHUB_STEP_SUMMARY
          else
            echo "results.json not found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Show Nova Server Logs
        if: always()
        run: docker logs nova-running-app

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: ${{ github.workspace }}/results.json

      - name: Update README with Stats
        if: github.ref == 'refs/heads/main'
        run: |
          NEW_STATS="### Latest Performance (Auto-updated)\n| RPS | p95 Latency | Avg Latency |\n| :--- | :--- | :--- |\n| **$RPS_FIXED** | **${P95_FIXED}ms** | **${AVG_FIXED}ms** |\n_Last Benchmarked: $(date)_"
          
          sed -i "//,//{ //b; //b; d }" README.md
          sed -i "//a $NEW_STATS" README.md
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update benchmark results [skip ci]" || echo "No changes to commit"
          git push