name: Nova Performance Benchmark

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Start Nova Server
        run: |
          docker build -t nova-app .
          docker run -d -p 10000:10000 --name nova-running-app nova-app
          sleep 5

      - name: Run k6 Benchmark
        run: |
          docker run --rm \
            --network="host" \
            -v ${{ github.workspace }}:/io \
            -i grafana/k6 run /io/scripts/bench.js

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results.json