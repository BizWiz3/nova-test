name: Nova Performance Benchmark

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Start Nova Server
        run: |
          # Build using your provided Dockerfile
          docker build -t nova-app .
          # Run it, mapping your port 10000 to the runner's 10000
          docker run -d -p 10000:10000 --name nova-running-app nova-app
          # Give it a few seconds to let pesde/lune initialize and start the server
          sleep 5

      - name: Run k6 Benchmark
        uses: grafana/k6-action@v0.3.1
        with:
          filename: scripts/bench.js
        # This allows k6 to talk to the docker container via localhost
        env:
          K6_OUT: json=results.json 

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: results.json