name: Nova Performance Benchmark
on: [push, pull_request]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Start Nova Server
        run: |
          docker build -t nova-app .
          docker run -d --network="host" --name nova-running-app nova-app
          
      - name: Wait for Server Ready
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8080/ > /dev/null; then
              echo "Nova is UP!"
              break
            fi
            echo "Waiting for Nova... ($i)"
            sleep 1
          done

      - name: Run k6 Benchmark
        run: |
          # Fix permissions for Docker write
          touch ${{ github.workspace }}/results.json
          chmod 666 ${{ github.workspace }}/results.json
          
          docker run --rm \
            --network="host" \
            -v ${{ github.workspace }}:/io \
            -i grafana/k6 run /io/scripts/bench.js \
            --out json=/io/results.json
        continue-on-error: true

      - name: Generate Action Summary
        if: always()
        run: |
          echo "## Nova Benchmark Results" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ github.workspace }}/results.json" ]; then
            # Extracting key metrics using jq
            RPS=$(grep "http_reqs" results.json | tail -n 1 | jq '.values.rate')
            LATENCY=$(grep "http_req_duration" results.json | tail -n 1 | jq '.values["p(95)"]')
            
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo "| **Requests/sec** | $RPS |" >> $GITHUB_STEP_SUMMARY
            echo "| **p95 Latency** | ${LATENCY}ms |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No results found. Check server logs." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Show Nova Server Logs
        if: always()
        run: docker logs nova-running-app

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: ${{ github.workspace }}/results.json